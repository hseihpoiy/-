<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傩戏数字博物馆登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0c0c1a 0%, #1a0c0c 100%);
            overflow: hidden;
            position: relative;
        }

        /* 粒子背景 */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 背景图片容器 */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .background-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide-active {
            opacity: 0.6;
        }

        /* 动态光影效果 */
        .light-effect {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 30, 30, 0.15) 0%, rgba(180, 30, 30, 0) 70%);
            filter: blur(10px);
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* 傩戏面具装饰元素 */
        .nuo-mask {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            z-index: 2;
            transition: all 0.5s ease;
            cursor: pointer;
            border: 2px solid rgba(180, 30, 30, 0.3);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.7);
        }

        .nuo-mask img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            filter: sepia(0.3) brightness(0.9);
        }

        .nuo-mask:hover {
            transform: scale(1.3) rotate(5deg);
            border-color: rgba(220, 160, 30, 0.7);
            box-shadow: 0 0 25px rgba(220, 160, 30, 0.5);
        }

        .nuo-mask:hover img {
            transform: scale(1.1);
            filter: sepia(0) brightness(1.1);
        }

        /* 时间显示 */
        .time-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(180, 30, 30, 0.3);
        }

        /* 登录容器 */
        .login-container {
            background: rgba(20, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 3.5rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            color: #fff;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(180, 30, 30, 0.3);
            z-index: 10;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(180, 30, 30, 0.6), transparent);
        }

        .login-title {
            margin-bottom: 2.5rem;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
            color: #e0c060;
            text-shadow: 0 0 10px rgba(220, 160, 30, 0.5);
        }

        .login-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 25%;
            width: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(220, 160, 30, 0.7), transparent);
        }

        .input-group {
            position: relative;
            margin-bottom: 2.2rem;
        }

        /* 完全透明的输入框 */
        .transparent-input {
            width: 100%;
            padding: 14px 0;
            font-size: 1.05rem;
            color: #fff;
            background: transparent;
            border: none;
            outline: none;
            border-bottom: 1px solid rgba(180, 30, 30, 0.3);
            transition: border-bottom-color 0.4s ease;
        }

        /* 输入框聚焦效果 */
        .transparent-input:focus {
            border-bottom-color: rgba(220, 160, 30, 0.8);
        }

        /* 浮动标签效果 */
        .input-label {
            position: absolute;
            top: 14px;
            left: 0;
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .transparent-input:focus + .input-label,
        .transparent-input:not(:placeholder-shown) + .input-label {
            top: -18px;
            font-size: 0.85rem;
            color: rgba(220, 160, 30, 0.9);
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(180, 30, 30, 0.3) 0%, rgba(220, 160, 30, 0.3) 100%);
            border: 1px solid rgba(220, 160, 30, 0.3);
            color: #fff;
            font-size: 1.05rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            margin-bottom: 1.8rem;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, rgba(180, 30, 30, 0.5) 0%, rgba(220, 160, 30, 0.5) 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .login-btn:focus:not(:active)::after {
            animation: ripple 1s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(20, 20);
                opacity: 0;
            }
        }

        .secondary-links {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .secondary-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
        }

        .secondary-links a:hover {
            color: rgba(220, 160, 30, 0.9);
        }

        .secondary-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: rgba(220, 160, 30, 0.7);
            transition: width 0.3s ease;
        }

        .secondary-links a:hover::after {
            width: 100%;
        }

        /* 背景切换指示器 */
        .bg-indicator {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 10;
        }

        .bg-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .bg-dot.active {
            background: rgba(220, 160, 30, 0.8);
        }

        /* 信息提示框 */
        .info-box {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #e0c060;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            max-width: 200px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(220, 160, 30, 0.3);
            text-align: center;
        }

        .info-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .login-container {
                padding: 2.5rem 1.5rem;
                margin: 0 15px;
            }
            
            .login-title {
                font-size: 1.8rem;
            }
            
            .nuo-mask {
                width: 50px;
                height: 50px;
            }
            
            .time-display {
                font-size: 0.8rem;
                padding: 8px 12px;
            }
        }

        /* 脉冲动画 */
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 25px rgba(220, 160, 30, 0.5);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            }
        }

        /* 博物馆标题 */
        .museum-title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            z-index: 10;
            font-weight: 300;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(180, 30, 30, 0.3);
        }

        /* 傩戏图腾装饰 */
        .nuo-pattern {
            position: absolute;
            width: 100px;
            height: 100px;
            opacity: 0.1;
            z-index: 1;
            pointer-events: none;
        }

        /* 动态文字效果 */
        .dynamic-text {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            z-index: 10;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- 背景图片容器 -->
    <div class="background-container">
        <!-- 傩戏背景图片 -->
        <div class="background-slide slide-active" style="background-image: url('../web大作业/背景001.png')"></div>
        
        <!-- 傩戏背景图片 2 -->
        <div class="background-slide" style="background-image: url('../web大作业/背景005.png')"></div>
        
        <!-- 傩戏背景图片 3 -->
        <div class="background-slide" style="background-image: url('../web大作业/背景002.png')"></div>
        
        <!-- 傩戏背景图片 4 -->
        <div class="background-slide" style="background-image: url('../web大作业/背景003.png')"></div>
    </div>

    <!-- 粒子背景 -->
    <div id="particles-js"></div>

    <!-- 动态光影效果 -->
    <div class="light-effect" id="light-effect"></div>

    <!-- 博物馆标题 -->
    <div class="museum-title">傩迹——傩戏非遗文化</div>

    <!-- 时间显示 -->
    <div class="time-display" id="time-display"></div>

    <!-- 登录表单 -->
    <div class="login-container">
        <h1 class="login-title">傩戏之旅</h1>
        <form>
            <div class="input-group">
                <input type="text" class="transparent-input" placeholder=" " required>
                <label class="input-label">用户名 / 邮箱</label>
            </div>
            <div class="input-group">
                <input type="password" class="transparent-input" placeholder=" " required>
                <label class="input-label">密码</label>
            </div>
            <button type="submit" class="login-btn">进入神秘世界</button>
            <div class="secondary-links">
                <a href="#">忘记密码？</a>
                <a href="#">注册新账号</a>
            </div>
        </form>
        
        <!-- 背景切换指示器 -->
        <div class="bg-indicator">
            <div class="bg-dot active" data-index="0"></div>
            <div class="bg-dot" data-index="1"></div>
            <div class="bg-dot" data-index="2"></div>
            <div class="bg-dot" data-index="3"></div>
        </div>
    </div>

    <!-- 信息提示框 -->
    <div class="info-box" id="info-box"></div>

    <!-- 动态文字 -->
    <div class="dynamic-text" id="dynamic-text">探索傩戏的神秘世界 · 感受千年文化的魅力</div>

    <!-- 音效 -->
    <audio id="hover-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/241/241-preview.mp3" type="audio/mpeg">
    </audio>
    <audio id="click-sound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/250/250-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 初始化粒子背景
        document.addEventListener('DOMContentLoaded', function() {
            // 粒子效果配置 - 调整为傩戏主题颜色
            particlesJS('particles-js', {
                particles: {
                    number: { 
                        value: 100, 
                        density: { 
                            enable: true, 
                            value_area: 800 
                        } 
                    },
                    color: { 
                        value: "#b41e1e" 
                    },
                    shape: { 
                        type: "circle" 
                    },
                    opacity: { 
                        value: 0.3, 
                        random: true 
                    },
                    size: { 
                        value: 3, 
                        random: true 
                    },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: "#b41e1e",
                        opacity: 0.2,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 2,
                        direction: "none",
                        random: true,
                        straight: false,
                        out_mode: "out",
                        bounce: false
                    }
                },
                interactivity: {
                    detect_on: "canvas",
                    events: {
                        onhover: { 
                            enable: true, 
                            mode: "repulse" 
                        },
                        onclick: { 
                            enable: true, 
                            mode: "push" 
                        },
                        resize: true
                    }
                }
            });

            // 背景图片轮播功能
            const bgSlides = document.querySelectorAll('.background-slide');
            const bgDots = document.querySelectorAll('.bg-dot');
            let currentBgSlide = 0;
            
            // 切换背景图片
            function changeBgSlide(index) {
                // 移除当前活动状态
                bgSlides[currentBgSlide].classList.remove('slide-active');
                bgDots[currentBgSlide].classList.remove('active');
                
                // 更新当前索引
                currentBgSlide = index;
                
                // 添加新的活动状态
                bgSlides[currentBgSlide].classList.add('slide-active');
                bgDots[currentBgSlide].classList.add('active');
            }
            
            // 为每个背景指示点添加点击事件
            bgDots.forEach((dot, index) => {
                dot.addEventListener('click', () => {
                    changeBgSlide(index);
                });
            });
            
            // 自动轮播背景
            setInterval(() => {
                let nextSlide = (currentBgSlide + 1) % bgSlides.length;
                changeBgSlide(nextSlide);
            }, 5000);

            // 时间显示
            function updateTime() {
                const now = new Date();
                const timeString = now.toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'
                });
                const dateString = now.toLocaleDateString('zh-CN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    weekday: 'long'
                });
                document.getElementById('time-display').innerHTML = 
                    `<div>${dateString}</div><div>${timeString}</div>`;
            }
            
            setInterval(updateTime, 1000);
            updateTime();

            // 鼠标跟随光影效果
            const lightEffect = document.getElementById('light-effect');
            document.addEventListener('mousemove', (e) => {
                lightEffect.style.left = `${e.clientX - 150}px`;
                lightEffect.style.top = `${e.clientY - 150}px`;
                lightEffect.style.opacity = '1';
            });

            // 傩戏面具元素交互
            const masks = document.querySelectorAll('.nuo-mask');
            const infoBox = document.getElementById('info-box');
            const hoverSound = document.getElementById('hover-sound');
            const clickSound = document.getElementById('click-sound');
            
            masks.forEach(mask => {
                // 鼠标悬停显示信息
                mask.addEventListener('mouseenter', (e) => {
                    const info = mask.getAttribute('data-info');
                    infoBox.textContent = info;
                    infoBox.classList.add('show');
                    
                    // 定位信息框
                    const rect = mask.getBoundingClientRect();
                    infoBox.style.left = `${rect.left + rect.width/2 - 100}px`;
                    infoBox.style.top = `${rect.top - 50}px`;
                    
                    // 播放悬停音效
                    hoverSound.currentTime = 0;
                    hoverSound.volume = 0.3;
                    hoverSound.play();
                    
                    // 添加脉动动画
                    mask.style.animation = 'pulse 1s infinite';
                });
                
                // 鼠标离开隐藏信息
                mask.addEventListener('mouseleave', () => {
                    infoBox.classList.remove('show');
                    mask.style.animation = 'none';
                });
                
                // 点击面具
                mask.addEventListener('click', (e) => {
                    e.preventDefault();
                    
                    // 播放点击音效
                    clickSound.currentTime = 0;
                    clickSound.volume = 0.5;
                    clickSound.play();
                    
                    // 创建点击波纹效果
                    const ripple = document.createElement('div');
                    ripple.style.position = 'fixed';
                    ripple.style.borderRadius = '50%';
                    ripple.style.border = '2px solid rgba(220,160,30,0.7)';
                    ripple.style.width = '0px';
                    ripple.style.height = '0px';
                    ripple.style.left = `${e.clientX}px`;
                    ripple.style.top = `${e.clientY}px`;
                    ripple.style.transform = 'translate(-50%, -50%)';
                    ripple.style.pointerEvents = 'none';
                    ripple.style.zIndex = '5';
                    document.body.appendChild(ripple);
                    
                    // 动画
                    const startTime = Date.now();
                    const animateRipple = () => {
                        const elapsed = Date.now() - startTime;
                        const progress = Math.min(elapsed / 1000, 1);
                        const size = progress * 200;
                        const opacity = 1 - progress;
                        
                        ripple.style.width = `${size}px`;
                        ripple.style.height = `${size}px`;
                        ripple.style.opacity = `${opacity}`;
                        
                        if (progress < 1) {
                            requestAnimationFrame(animateRipple);
                        } else {
                            document.body.removeChild(ripple);
                        }
                    };
                    
                    animateRipple();
                });
            });
// 表单提交处理
const form = document.querySelector('form');
form.addEventListener('submit', function(e) {
    e.preventDefault();
    const username = this.querySelector('input[type="text"]').value;
    const password = this.querySelector('input[type="password"]').value;
    
    // 这里可以添加实际的登录验证逻辑
    if(username && password) {
        // 模拟登录成功
        const loginBtn = this.querySelector('.login-btn');
        loginBtn.textContent = '欢迎进入傩戏世界!';
        loginBtn.style.background = 'rgba(46, 204, 113, 0.3)';
        loginBtn.style.borderColor = 'rgba(46, 204, 113, 0.5)';
        
        setTimeout(() => {
            alert('登录成功！即将进入傩戏数字博物馆...');
            window.location.href = "首页.html";
        }, 1000);
    } else {
        alert('请输入用户名和密码');
    }
});

            // 动态文字效果
            const dynamicText = document.getElementById('dynamic-text');
            const texts = [
                "探索傩戏的神秘世界 · 感受千年文化的魅力",
                "傩戏 · 中国最古老的戏剧形式之一",
                "面具背后的故事 · 传统文化的活化石",
                "驱邪逐疫 · 祈福纳吉 · 傩戏的古老使命"
            ];
            let textIndex = 0;
            
            function changeText() {
                dynamicText.style.opacity = 0;
                setTimeout(() => {
                    textIndex = (textIndex + 1) % texts.length;
                    dynamicText.textContent = texts[textIndex];
                    dynamicText.style.opacity = 1;
                }, 1000);
            }
            
            setInterval(changeText, 5000);
        });
    </script>
</body>
</html>
